services:

# --------- Customer Service ----------

  customerservice_mongodb:
    image: quay.io/mongodb/mongodb-community-server
    container_name: customerservice_mongodb
    env_file:
      - ./.env
    ports:
      - "27017:27017"
    volumes:
      - customerservice_mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand({ ping: 1 })\""]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - flight-booking-network

  customerservice_mongodb_init:
    image: quay.io/mongodb/mongodb-community-server
    container_name: customerservice_mongodb_init
    restart: "no"
    env_file:
      - ./.env
    command: >
      sh -ec "
        until mongosh --host customerservice_mongodb --username \"$$MONGODB_INITDB_ROOT_USERNAME\" --password \"$$MONGODB_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --quiet --eval \"db.adminCommand({ ping: 1 })\"; do sleep 2; done;
        mongosh --host customerservice_mongodb --username \"$$MONGODB_INITDB_ROOT_USERNAME\" --password \"$$MONGODB_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin /init/init-customer-db.js
      "
    depends_on:
      customerservice_mongodb:
        condition: service_healthy
    volumes:
      - ./db:/init:ro
    networks:
      - flight-booking-network

# Customer Service API
  customer-service:
    build:
      context: .
      dockerfile: ./docker/Containerfile
    container_name: customer-service
    restart: always
    env_file:
      - ./.env
    ports:
      - "8084:8084"
      - "9094:9094"
    volumes:
      - ./https-certs:/opt/app-root/src/https-certs:ro
    depends_on:
      customerservice_mongodb_init:
        condition: service_completed_successfully
      customerservice_mongodb:
        condition: service_healthy
    networks:
      - flight-booking-network

# -------  Network ---------

networks:
  flight-booking-network:
    name: flight-booking-network
    driver: bridge

# ----------  Volumes --------------

volumes:
  customerservice_mongodb_data:
