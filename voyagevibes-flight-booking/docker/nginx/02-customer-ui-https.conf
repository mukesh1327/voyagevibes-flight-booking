server {
  listen 8443 ssl;
  http2 on;
  server_name customer-ui.voyagevibes.in;
  resolver 10.89.0.1 valid=30s ipv6=off;
  resolver_timeout 5s;

  root /opt/app-root/src;
  index index.html;

  ssl_certificate /etc/nginx/certs/customer-ui.voyagevibes.in.crt.pem;
  ssl_certificate_key /etc/nginx/certs/customer-ui.voyagevibes.in.key.pem;

  proxy_http_version 1.1;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Real-IP $remote_addr;

  location /gateway-api/ {
    proxy_set_header Host customer-api.voyagevibes.in;
    set $gateway_upstream kong_gateway:8000;
    rewrite ^/gateway-api/(.*)$ /$1 break;
    proxy_pass http://$gateway_upstream;
  }

  location /auth-api/ {
    set $auth_upstream auth-service:8081;
    rewrite ^/auth-api/(.*)$ /$1 break;
    proxy_pass http://$auth_upstream;
  }

  location /flight-api/ {
    set $flight_upstream flight-service:8082;
    rewrite ^/flight-api/(.*)$ /$1 break;
    proxy_pass http://$flight_upstream;
  }

  location /booking-api/ {
    set $booking_upstream booking-service:8083;
    rewrite ^/booking-api/(.*)$ /$1 break;
    proxy_pass http://$booking_upstream;
  }

  location /customer-api/ {
    set $customer_upstream customer-service:8084;
    rewrite ^/customer-api/(.*)$ /$1 break;
    proxy_pass http://$customer_upstream;
  }

  location /payment-api/ {
    set $payment_upstream payment-service:8085;
    rewrite ^/payment-api/(.*)$ /$1 break;
    proxy_pass http://$payment_upstream;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
