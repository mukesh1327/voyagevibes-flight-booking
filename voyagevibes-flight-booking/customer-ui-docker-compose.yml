services:
  customer-ui:
    build:
      context: .
      dockerfile: ./docker/Containerfile
    container_name: customer-ui
    restart: always
    env_file:
      - ./.env
    ports:
      - "8080:8443"
    volumes:
      - ./https-certs:/etc/nginx/certs:ro
    networks:
      - flight-booking-network

networks:
  flight-booking-network:
    external: true
    name: flight-booking-network
