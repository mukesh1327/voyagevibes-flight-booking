services:

  kong_postgres:
    image: registry.redhat.io/rhel9/postgresql-16:latest
    container_name: kong_postgres
    restart: always
    environment:
      POSTGRESQL_DATABASE: kong
      POSTGRESQL_USER: kong
      POSTGRESQL_PASSWORD: kongpass123
    volumes:
      - kong_postgres_data:/var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - flight-booking-network

# -----------

  kong-migrations:
    image: docker.io/library/kong
    command: >
      /bin/sh -c
      "kong migrations bootstrap --vv ||
      (kong migrations up --vv && kong migrations finish --vv)"
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong_postgres
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass123
    depends_on:
      kong_postgres:
        condition: service_healthy
    networks:
      - flight-booking-network

# -----------

  kong_gateway:
    image: docker.io/library/kong
    container_name: kong_voyagevibes_gateway
    ports:
      - "8000:8000"  # Proxy (your services entrypoint)
      - "8443:8443"  # HTTPS
      - "8001:8001"  # Admin API
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong_postgres
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass123
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_LOG_LEVEL: debug
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 http2 ssl
      KONG_SSL_CERT: /etc/kong/certs/gateway.voyagevibes.in.crt.pem
      KONG_SSL_CERT_KEY: /etc/kong/certs/gateway.voyagevibes.in.key.pem
    volumes:
      - ./https-certs/kong-certs:/etc/kong/certs:ro
    depends_on:
      kong_postgres:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    networks:
      - flight-booking-network

# ================= Network ========================

networks:
  flight-booking-network:
    name: flight-booking-network
    driver: bridge

# ================= Volumes ========================

volumes:
  kong_postgres_data:
