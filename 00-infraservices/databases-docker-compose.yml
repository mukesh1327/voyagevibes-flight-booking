services:

# ================= Auth Service + Keycloak + Kong + Notification Service (Postgres) ========================

  platform_postgres:
    container_name: platform_postgres
    image: registry.redhat.io/rhel9/postgresql-16:latest
    restart: always
    env_file:
      - ./.env.databases
    ports:
      - "5432:5432"
    volumes:
      - platform_postgres_data:/var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRESQL_USER -d $$POSTGRESQL_DATABASE -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - flight-booking-network

# ================= Flight Service (MySQL) ========================

  platform_mysql:
    image: registry.redhat.io/rhel9/mysql-84:latest
    container_name: platform_mysql
    restart: always
    env_file:
      - ./.env.databases
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - platform_mysql_data:/var/lib/mysql/data
    networks:
      - flight-booking-network

# ================= Booking Service (MSSQL) ========================

  platform_mssql:
    image: mcr.microsoft.com/mssql/rhel/server:2025-latest
    container_name: platform_mssql
    restart: always
    env_file:
      - ./.env.databases
    ports:
      - "1433:1433"
    volumes:
      - platform_mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - flight-booking-network

# ================= Customer Service (MongoDB) ========================

  platform_mongodb:
    image: quay.io/mongodb/mongodb-community-server
    container_name: platform_mongodb
    restart: always
    env_file:
      - ./.env.databases
    ports:
      - "27017:27017"
    volumes:
      - platform_mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand({ ping: 1 })\""]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - flight-booking-network

# ================= Notification Service (Redis) ========================

  platform_redis:
    image: registry.redhat.io/rhel9/redis-7:9.7
    container_name: platform_redis
    restart: always
    env_file:
      - ./.env.databases
    ports:
      - "6380:6379"
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - flight-booking-network

# ================= Network ========================

networks:
  flight-booking-network:
    name: flight-booking-network
    driver: bridge

# ================= Volumes ========================

volumes:
  platform_postgres_data:
  platform_mysql_data:
  platform_mssql_data:
  platform_mongodb_data:
