global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['opentelemetry-collector:8889']

  - job_name: 'otel-collector-internal'
    static_configs:
      - targets: ['opentelemetry-collector:8888']

  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'localhost:9090' ]
  - job_name: 'tempo'
    static_configs:
      - targets:
          - 'tempo:3200'

  # - job_name: 'vulture'
  #   static_configs:
  #     - targets:
  #         - 'vulture:8080'

  # Add service metrics here when available (example):
  # - job_name: 'booking-service'
