events {
    worker_connections 1024;
}

http {
    upstream platform_garage_s3_api {
        server 127.0.0.1:3900;
    }

    server {
        listen 8000;
        server_name _;

        client_max_body_size 0;
        proxy_request_buffering off;

        location / {
            proxy_pass http://platform_garage_s3_api;
            proxy_set_header Host 127.0.0.1:3900;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable buffering for better performance
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    server {
        listen 8081;
        server_name _;

        location / {
            proxy_pass http://127.0.0.1:3902;
            proxy_set_header Host static-website.web.garage.localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
