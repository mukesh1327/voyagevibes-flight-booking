quarkus.http.cors.enabled=true
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.additional-jdbc-properties.createDatabaseIfNotExist=true
quarkus.datasource.jdbc.additional-jdbc-properties.useSSL=false
quarkus.datasource.jdbc.additional-jdbc-properties.allowPublicKeyRetrieval=true
quarkus.datasource.jdbc.additional-jdbc-properties.serverTimezone=UTC

flight.db.init.script=${FLIGHT_DB_INIT_SCRIPT:db/init-flight-db.sql}

# Kafka base config
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9192}

# Outgoing inventory events
mp.messaging.outgoing.flight-inventory-events.connector=smallrye-kafka
mp.messaging.outgoing.flight-inventory-events.topic=${FLIGHT_KAFKA_INVENTORY_TOPIC:flight.inventory.events}
mp.messaging.outgoing.flight-inventory-events.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.flight-inventory-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.flight-inventory-events.acks=1

# Incoming booking events
mp.messaging.incoming.booking-events.connector=smallrye-kafka
mp.messaging.incoming.booking-events.topic=${BOOKING_KAFKA_TOPIC:booking.events}
mp.messaging.incoming.booking-events.group.id=${BOOKING_EVENTS_CONSUMER_GROUP:flight-service}
mp.messaging.incoming.booking-events.auto.offset.reset=${BOOKING_EVENTS_AUTO_OFFSET_RESET:latest}
mp.messaging.incoming.booking-events.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.booking-events.value.deserializer=com.cloudxplorer.flightservice.messaging.BookingEventDeserializer

# ----------------------------
# Development profile (%dev)
# ----------------------------
%dev.quarkus.http.port=${HTTP_PORT:8082}
%dev.quarkus.http.ssl-port=${HTTPS_PORT:9092}
%dev.quarkus.http.insecure-requests=${QUARKUS_HTTP_INSECURE_REQUESTS:enabled}
%dev.quarkus.http.ssl.certificate.files=${SERVER_SSL_CERTIFICATE:${LOCAL_CERTS_DIR:../00-localtest-certs}/flight.voyagevibes.in.crt.pem}
%dev.quarkus.http.ssl.certificate.key-files=${SERVER_SSL_CERTIFICATE_PRIVATE_KEY:${LOCAL_CERTS_DIR:../00-localtest-certs}/flight.voyagevibes.in.key.pem}
%dev.quarkus.datasource.username=${MYSQL_USER:root}
%dev.quarkus.datasource.password=${MYSQL_PASSWORD:RedHat#123}
%dev.quarkus.datasource.jdbc.url=${MYSQL_JDBC_URL:jdbc:mysql://localhost:3306/flight_booking}
%dev.flight.db.init.enabled=${FLIGHT_DB_INIT_ENABLED:false}

# ----------------------------
# Production profile (%prod)
# ----------------------------
%prod.quarkus.http.port=${HTTP_PORT:8082}
%prod.quarkus.http.ssl-port=${HTTPS_PORT:9092}
%prod.quarkus.http.insecure-requests=${QUARKUS_HTTP_INSECURE_REQUESTS:enabled}
%prod.quarkus.http.ssl.certificate.files=${SERVER_SSL_CERTIFICATE:${LOCAL_CERTS_DIR:../00-localtest-certs}/flight.voyagevibes.in.crt.pem}
%prod.quarkus.http.ssl.certificate.key-files=${SERVER_SSL_CERTIFICATE_PRIVATE_KEY:${LOCAL_CERTS_DIR:../00-localtest-certs}/flight.voyagevibes.in.key.pem}
%prod.quarkus.datasource.username=${MYSQL_USER:root}
%prod.quarkus.datasource.password=${MYSQL_PASSWORD:RedHat#123}
%prod.quarkus.datasource.jdbc.url=${MYSQL_JDBC_URL:jdbc:mysql://localhost:3306/flight_booking}
%prod.flight.db.init.enabled=${FLIGHT_DB_INIT_ENABLED:false}

