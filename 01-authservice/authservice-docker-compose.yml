services:
# =============== Keycloak ===========================

# Keycloak postgres

  keycloak_postgres:
    container_name: keycloak_postgres
    image: registry.redhat.io/rhel9/postgresql-16:latest
    restart: always
    env_file:
      - ./.env.keycloak
    ports: 
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRESQL_USER -d $$POSTGRESQL_DATABASE -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - keycloak_postgres_data:/var/lib/pgsql/data  # Volume keycloak_postgres_data
    networks:
      - flight-booking-network

# ---------

# Keycloak

  keycloak:
    container_name: keycloak
    image: registry.redhat.io/rhbk/keycloak-rhel9:26.2-15
    restart: always
    env_file:
      - ./.env.keycloak
    ports:
      - "8090:8080"
      - "8091:8443"
    command:
      - start
      - --import-realm
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 60s
    depends_on:
      keycloak_postgres:
         condition: service_healthy
    volumes:
      - ./keycloak-configs/realms:/opt/keycloak/data/import:ro
      - ./https-certs/keycloak:/opt/keycloak/certs:ro
    networks:
      - flight-booking-network
  
# ================= Auth Service ========================

# Auth service postgres DB
  authservice_postgres:
    container_name: authservice_postgres
    image: registry.redhat.io/rhel9/postgresql-16:latest
    restart: always
    env_file:
      - ./.env.authservice
    ports: 
      - "5432:5432"
    volumes:
      - authservice_postgres_data:/var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRESQL_USER -d $$POSTGRESQL_DATABASE -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - flight-booking-network

# ----------

# Auth service DB initialization
  authservice_postgres_init:
    image: registry.redhat.io/rhel9/postgresql-16:latest
    container_name: authservice_postgres_init
    restart: "no"
    env_file:
      - ./.env.authservice
    command: >
      sh -ec "
        until pg_isready -h authservice_postgres -U $$POSTGRESQL_USER -d $$POSTGRESQL_DATABASE; do sleep 2; done;
        psql -h authservice_postgres -U $$POSTGRESQL_USER -d $$POSTGRESQL_DATABASE -v ON_ERROR_STOP=1 -f /init/init-auth-db.sql
      "
    depends_on:
      authservice_postgres:
        condition: service_healthy

    volumes:
      - ./db:/init:ro
    networks:
      - flight-booking-network

# ----------

# Auth service
  auth-service:
    build: 
      context: .
      dockerfile: ./docker/Containerfile
    container_name: auth-service
    restart: always
    env_file:
      - ./.env.authservice
    depends_on:
      keycloak:
        condition: service_healthy
      authservice_postgres_init:
        condition: service_completed_successfully
      authservice_postgres:
        condition: service_healthy

    ports:
      - "8081:8081"
      - "9091:9091"
    volumes:
      - ./https-certs/authservice:/etc/ssl/https-certs:ro
    networks:
      - flight-booking-network

# ================= Network ========================

networks:
  flight-booking-network:
    name: flight-booking-network
    driver: bridge

# ================= Volumes ========================

volumes:
  keycloak_postgres_data:
  authservice_postgres_data:
