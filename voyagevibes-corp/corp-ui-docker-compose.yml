services:
  corp-ui:
    image: quay.io/mukeshs1306/voyagevibes-ui-customer:latest
    # build:
    #   context: .
    #   dockerfile: ./docker/Containerfile
    container_name: corp-ui
    restart: always
    env_file:
      - ./.env
    ports:
      - "9002:9002"
    volumes:
      - ./https-certs:/etc/nginx/certs:ro
      - nginx_logs:/opt/app-root/src/logs/nginx
    networks:
      - flight-booking-network

networks:
  flight-booking-network:
    external: true
    name: flight-booking-network

volumes:
  nginx_logs:

