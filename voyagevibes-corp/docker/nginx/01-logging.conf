# JSON access logs for OpenTelemetry filelog ingestion.
log_format otel_json escape=json '{'
  '"time":"$time_iso8601",'
  '"remote_addr":"$remote_addr",'
  '"host":"$host",'
  '"request":"$request",'
  '"status":$status,'
  '"body_bytes_sent":$body_bytes_sent,'
  '"request_time":$request_time,'
  '"http_referer":"$http_referer",'
  '"http_user_agent":"$http_user_agent",'
  '"service":"corp-ui"'
  '}';

access_log /opt/app-root/src/logs/nginx/corp-ui.access.log otel_json;
error_log /opt/app-root/src/logs/nginx/corp-ui.error.log notice;
