server {
  listen 8443 ssl default_server;
  http2 on;
  server_name _;

  ssl_certificate /etc/nginx/certs/corp-ui.voyagevibes.in.crt.pem;
  ssl_certificate_key /etc/nginx/certs/corp-ui.voyagevibes.in.key.pem;

  return 421;
}

server {
  listen 8443 ssl;
  http2 on;
  server_name corp-ui.voyagevibes.in;
  resolver 10.89.0.1 valid=30s ipv6=off;
  resolver_timeout 5s;

  root /opt/app-root/src;
  index index.html;

  ssl_certificate /etc/nginx/certs/corp-ui.voyagevibes.in.crt.pem;
  ssl_certificate_key /etc/nginx/certs/corp-ui.voyagevibes.in.key.pem;

  if ($host != corp-ui.voyagevibes.in) {
    return 421;
  }

  proxy_http_version 1.1;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Real-IP $remote_addr;

  location /gateway-api/ {
    proxy_set_header Host corp-api.voyagevibes.in;
    set $gateway_upstream kong_gateway:8000;
    rewrite ^/gateway-api/(.*)$ /$1 break;
    proxy_pass http://$gateway_upstream;
  }

  location ~ ^/corp-(auth|flight|booking|payment)-api/ {
    return 404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
