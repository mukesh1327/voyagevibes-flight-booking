server {
  listen 8443 ssl;
  http2 on;
  server_name corp-ui.voyagevibes.in;
  resolver 10.89.0.1 valid=30s ipv6=off;
  resolver_timeout 5s;

  root /opt/app-root/src;
  index index.html;

  ssl_certificate /etc/nginx/certs/corp-ui.voyagevibes.in.crt.pem;
  ssl_certificate_key /etc/nginx/certs/corp-ui.voyagevibes.in.key.pem;

  proxy_http_version 1.1;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Real-IP $remote_addr;

  location /gateway-api/ {
    proxy_set_header Host corp-api.voyagevibes.in;
    set $gateway_upstream kong_gateway:8000;
    rewrite ^/gateway-api/(.*)$ /$1 break;
    proxy_pass http://$gateway_upstream;
  }

  location /corp-auth-api/ {
    set $corp_auth_upstream auth-service:8081;
    rewrite ^/corp-auth-api/(.*)$ /$1 break;
    proxy_pass http://$corp_auth_upstream;
  }

  location /corp-flight-api/ {
    set $corp_flight_upstream flight-service:8082;
    rewrite ^/corp-flight-api/(.*)$ /$1 break;
    proxy_pass http://$corp_flight_upstream;
  }

  location /corp-booking-api/ {
    set $corp_booking_upstream booking-service:8083;
    rewrite ^/corp-booking-api/(.*)$ /$1 break;
    proxy_pass http://$corp_booking_upstream;
  }

  location /corp-payment-api/ {
    set $corp_payment_upstream payment-service:8085;
    rewrite ^/corp-payment-api/(.*)$ /$1 break;
    proxy_pass http://$corp_payment_upstream;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
