services:

# --------- Payment Service ----------

# Payment service postgres DB
  paymentservice_postgres:
    image: registry.redhat.io/rhel9/postgresql-16:latest
    container_name: paymentservice_postgres
    restart: always
    env_file:
      - ./.env
    ports:
      - "5434:5432"
    volumes:
      - paymentservice_postgres_data:/var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRESQL_USER -d $$POSTGRESQL_DATABASE -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - flight-booking-network

# Payment service DB initialization

  paymentservice_postgres_init:
    image: registry.redhat.io/rhel9/postgresql-16:latest
    container_name: paymentservice_postgres_init
    restart: "no"
    env_file:
      - ./.env
    command: >
      sh -ec "
        until pg_isready -h paymentservice_postgres -U $$POSTGRESQL_USER -d $$POSTGRESQL_DATABASE; do sleep 2; done;
        psql -h paymentservice_postgres -U $$POSTGRESQL_USER -d $$POSTGRESQL_DATABASE -v ON_ERROR_STOP=1 -f /init/init-payment-db.sql
      "
    depends_on:
      paymentservice_postgres:
        condition: service_healthy
    volumes:
      - ./db:/init:ro
    networks:
      - flight-booking-network

# Payment Service API
  payment-service:
    build:
      context: .
      dockerfile: ./docker/Containerfile
    container_name: payment-service
    restart: always
    env_file:
      - ./.env
    ports:
      - "8085:8085"
      - "9095:9095"
    volumes:
      - ./https-certs:/app/https-certs:ro
    depends_on:
      paymentservice_postgres:
        condition: service_healthy
      paymentservice_postgres_init:
        condition: service_completed_successfully
    networks:
      - flight-booking-network

# -------  Network ---------

networks:
  flight-booking-network:
    name: flight-booking-network
    driver: bridge

# ----------  Volumes --------------

volumes:
  paymentservice_postgres_data:
