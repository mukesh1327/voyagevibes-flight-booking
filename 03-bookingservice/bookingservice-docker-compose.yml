services:

# --------- Booking Service ----------

# MSSQL Server for Booking Service
  bookingservice_mssql:
    image: mcr.microsoft.com/mssql/rhel/server:2025-latest  # Or 2022-latest for older
    container_name: bookingservice_mssql
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'RedHat#123'  # Must meet complexity: 8+ chars, uppercase/lowercase/number/special
      MSSQL_PID: 'Developer'  # Free for dev/test
    ports:
      - "1433:1433"
    volumes:
      - bookingservice_mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - flight-booking-network

# MSSQL Initialization Container for Booking Service
  bookingservice_mssql_init:
    image: mcr.microsoft.com/mssql/rhel/server:2025-latest
    container_name: bookingservice_mssql_init
    restart: "no"
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'RedHat#123'
    command: >
      /bin/sh -ec "
        until /opt/mssql-tools18/bin/sqlcmd -S bookingservice_mssql -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C; do sleep 2; done;
        /opt/mssql-tools18/bin/sqlcmd -S bookingservice_mssql -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -i /init/init-booking-db.sql
      "
    depends_on:
      bookingservice_mssql:
        condition: service_healthy
    volumes:
      - ./db:/init:ro
    networks:
      - flight-booking-network

# Booking Service API
  booking-service:
    build:
      context: .
      dockerfile: ./docker/Containerfile
    container_name: booking-service
    restart: always
    environment:
      APP_ENV: prod
      HTTP_PORT: 8083
      HTTPS_PORT: 9093
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_CERTIFICATE: /app/https-certs/booking.voyagevibes.in.crt.pem
      SERVER_SSL_CERTIFICATE_PRIVATE_KEY: /app/https-certs/booking.voyagevibes.in.key.pem
      KAFKA__ENABLED: "true"
      KAFKA__BOOTSTRAPSERVERS: kafka:9092
      EXTERNALSERVICES__FLIGHT__BASEURL: http://flight-service:8082
      EXTERNALSERVICES__FLIGHT__ALLOWINSECURETLS: "false"
    ports:
      - "8083:8083"
      - "9093:9093"
    volumes:
      - ./https-certs:/app/https-certs:ro
    depends_on:
      bookingservice_mssql_init:
        condition: service_completed_successfully
      bookingservice_mssql:
        condition: service_healthy
    networks:
      - flight-booking-network

# -------  Network ---------

networks:
  flight-booking-network:
    name: flight-booking-network
    driver: bridge

# ----------  Volumes --------------

volumes:
  bookingservice_mssql_data:
